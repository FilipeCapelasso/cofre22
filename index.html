<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Organizador Financeiro</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Mono:wght@400;500&family=Sora:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0f0e0c;
    --surface: #1a1916;
    --surface2: #222120;
    --border: rgba(255,255,255,0.07);
    --border2: rgba(255,255,255,0.12);
    --text: #f0ede6;
    --muted: #7a7670;
    --accent: #c8a96e;
    --accent2: #e8c97e;
    --green: #5a9e6f;
    --green-bg: rgba(90,158,111,0.12);
    --red: #c05a5a;
    --red-bg: rgba(192,90,90,0.12);
    --yellow: #c8a040;
    --yellow-bg: rgba(200,160,64,0.12);
  }

  html { scroll-behavior: smooth; }

  body {
    font-family: 'Sora', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    font-size: 15px;
    line-height: 1.6;
  }

  /* NOISE TEXTURE */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
    pointer-events: none;
    z-index: 0;
    opacity: 0.5;
  }

  .app {
    position: relative;
    z-index: 1;
    max-width: 860px;
    margin: 0 auto;
    padding: 2.5rem 1.5rem 4rem;
  }

  /* HEADER */
  .header {
    margin-bottom: 2.5rem;
    border-bottom: 1px solid var(--border);
    padding-bottom: 1.5rem;
  }

  .header-top {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    gap: 1rem;
    flex-wrap: wrap;
  }

  .logo {
    font-family: 'DM Serif Display', serif;
    font-size: 2rem;
    color: var(--accent);
    letter-spacing: -0.02em;
    line-height: 1;
  }

  .logo span {
    display: block;
    font-size: 0.75rem;
    font-family: 'Sora', sans-serif;
    font-weight: 300;
    color: var(--muted);
    letter-spacing: 0.15em;
    text-transform: uppercase;
    margin-top: 4px;
  }

  .mes-badge {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 6px 14px;
    font-size: 12px;
    color: var(--muted);
    font-family: 'DM Mono', monospace;
  }

  /* SALARY BLOCK */
  .salary-block {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 1.5rem;
    margin-bottom: 1rem;
    position: relative;
    overflow: hidden;
  }

  .salary-block::after {
    content: '';
    position: absolute;
    top: -40px; right: -40px;
    width: 140px; height: 140px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(200,169,110,0.08) 0%, transparent 70%);
    pointer-events: none;
  }

  .block-label {
    font-size: 11px;
    font-weight: 500;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 10px;
  }

  .salary-row {
    display: flex;
    align-items: center;
    gap: 12px;
    flex-wrap: wrap;
  }

  .currency-prefix {
    font-family: 'DM Mono', monospace;
    font-size: 1.1rem;
    color: var(--accent);
    flex-shrink: 0;
  }

  input[type="number"], input[type="text"] {
    background: var(--surface2);
    border: 1px solid var(--border2);
    border-radius: 8px;
    color: var(--text);
    font-family: 'DM Mono', monospace;
    font-size: 0.95rem;
    padding: 8px 12px;
    outline: none;
    transition: border-color 0.2s;
  }

  input[type="number"]:focus, input[type="text"]:focus {
    border-color: var(--accent);
  }

  input[type="number"]::-webkit-inner-spin-button,
  input[type="number"]::-webkit-outer-spin-button { opacity: 0.4; }

  #salarioInput {
    font-size: 1.5rem;
    width: 200px;
    font-weight: 500;
    color: var(--accent2);
    background: transparent;
    border: none;
    border-bottom: 1px solid var(--border2);
    border-radius: 0;
    padding: 4px 0;
  }

  #salarioInput:focus { border-color: var(--accent); }

  .disponivel-label {
    font-size: 12px;
    color: var(--muted);
    margin-left: auto;
    font-family: 'DM Mono', monospace;
  }

  /* INVEST BLOCK */
  .invest-block {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 1.25rem 1.5rem;
    margin-bottom: 1rem;
  }

  .invest-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
    margin-top: 10px;
  }

  @media (max-width: 520px) { .invest-grid { grid-template-columns: 1fr; } }

  .invest-field { display: flex; flex-direction: column; gap: 5px; }
  .invest-field label { font-size: 11px; color: var(--muted); letter-spacing: 0.08em; text-transform: uppercase; }
  .invest-field input { width: 100%; }

  .invest-result {
    margin-top: 10px;
    padding: 10px 14px;
    background: var(--green-bg);
    border: 1px solid rgba(90,158,111,0.2);
    border-radius: 8px;
    font-family: 'DM Mono', monospace;
    font-size: 13px;
    color: var(--green);
    line-height: 1.6;
  }

  /* SUMMARY */
  .summary {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 10px;
    margin-bottom: 1rem;
  }

  @media (max-width: 520px) { .summary { grid-template-columns: 1fr 1fr; } }

  .sum-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 14px 16px;
  }

  .sum-card .lbl { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.1em; margin-bottom: 6px; }
  .sum-card .val { font-family: 'DM Mono', monospace; font-size: 1.15rem; font-weight: 500; }
  .val.ok { color: var(--green); }
  .val.warn { color: var(--yellow); }
  .val.bad { color: var(--red); }
  .val.neutral { color: var(--text); }

  /* BUTTONS */
  .btn-row {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    margin-bottom: 1.25rem;
  }

  .btn {
    display: inline-flex;
    align-items: center;
    gap: 7px;
    border-radius: 8px;
    font-size: 13px;
    font-weight: 500;
    padding: 9px 16px;
    cursor: pointer;
    transition: all 0.15s;
    font-family: 'Sora', sans-serif;
    border: 1px solid transparent;
  }

  .btn:active { transform: scale(0.97); }

  .btn-gold {
    background: var(--accent);
    color: var(--bg);
    border-color: var(--accent);
  }
  .btn-gold:hover { background: var(--accent2); }

  .btn-outline {
    background: transparent;
    color: var(--text);
    border-color: var(--border2);
  }
  .btn-outline:hover { background: var(--surface); border-color: var(--accent); color: var(--accent); }

  .btn-green {
    background: var(--green-bg);
    color: var(--green);
    border-color: rgba(90,158,111,0.25);
  }
  .btn-green:hover { background: rgba(90,158,111,0.2); }

  /* ADD FORM */
  .add-form {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 1.25rem;
    margin-bottom: 1rem;
    display: none;
    animation: fadeIn 0.2s ease;
  }

  .add-form.open { display: block; }

  .add-form-grid {
    display: grid;
    grid-template-columns: 2fr 1fr 60px;
    gap: 8px;
    margin-top: 10px;
    align-items: end;
  }

  @media (max-width: 520px) { .add-form-grid { grid-template-columns: 1fr 1fr; } }

  .field { display: flex; flex-direction: column; gap: 5px; }
  .field label { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.08em; }
  .field input { width: 100%; }

  /* CATEGORIES */
  .cats-title {
    font-size: 11px;
    font-weight: 500;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 10px;
  }

  .cats-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
    gap: 10px;
    margin-bottom: 1.5rem;
  }

  .cat-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 1.1rem 1.25rem;
    transition: border-color 0.2s;
    animation: fadeIn 0.25s ease;
  }

  .cat-card:hover { border-color: var(--border2); }

  .cat-header {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 10px;
  }

  .cat-emoji {
    width: 34px; height: 34px;
    border-radius: 8px;
    background: var(--surface2);
    display: flex; align-items: center; justify-content: center;
    font-size: 16px;
    flex-shrink: 0;
  }

  .cat-name { font-size: 13px; font-weight: 500; flex: 1; line-height: 1.3; }

  .cat-del {
    background: none; border: none;
    color: var(--muted); cursor: pointer;
    font-size: 16px; padding: 4px;
    border-radius: 6px;
    transition: all 0.15s;
    line-height: 1;
  }
  .cat-del:hover { color: var(--red); background: var(--red-bg); }

  .cat-inputs {
    display: flex; gap: 8px; align-items: center;
    margin-bottom: 8px;
  }

  .cat-inputs input[type="number"] {
    flex: 1; font-size: 12px; padding: 6px 8px;
  }

  .pct-sign {
    font-size: 12px; color: var(--muted);
    font-family: 'DM Mono', monospace;
  }

  .or-divider {
    font-size: 11px; color: var(--muted);
    padding: 0 2px;
  }

  .cat-value {
    font-family: 'DM Serif Display', serif;
    font-size: 1.4rem;
    color: var(--accent);
    line-height: 1;
  }

  .cat-sub { font-size: 11px; color: var(--muted); margin-top: 3px; }

  .prog-bar {
    height: 3px;
    background: var(--surface2);
    border-radius: 2px;
    margin-top: 10px;
    overflow: hidden;
  }
  .prog-fill {
    height: 100%;
    background: var(--accent);
    border-radius: 2px;
    transition: width 0.4s ease;
  }

  /* HISTORY */
  .hist-section {
    border-top: 1px solid var(--border);
    padding-top: 1.5rem;
    margin-top: 0.5rem;
  }

  .hist-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 1rem;
  }

  .hist-title {
    font-family: 'DM Serif Display', serif;
    font-size: 1.15rem;
    color: var(--text);
  }

  .hist-empty {
    color: var(--muted);
    font-size: 13px;
    padding: 1rem 0;
    font-style: italic;
  }

  .hist-entry {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 1rem 1.25rem;
    margin-bottom: 8px;
    animation: fadeIn 0.2s ease;
  }

  .hist-top {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 8px;
  }

  .hist-date {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    color: var(--muted);
  }

  .hist-sal {
    font-family: 'DM Mono', monospace;
    font-size: 13px;
    color: var(--accent);
    font-weight: 500;
  }

  .hist-del {
    background: none; border: none;
    color: var(--muted); cursor: pointer;
    font-size: 14px; padding: 3px 6px;
    border-radius: 5px;
    transition: all 0.15s;
  }
  .hist-del:hover { color: var(--red); background: var(--red-bg); }

  .hist-badges {
    display: flex; flex-wrap: wrap; gap: 6px;
    margin-bottom: 6px;
  }

  .hist-badge {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 5px;
    padding: 3px 9px;
    font-size: 11px;
    color: var(--text);
    font-family: 'DM Mono', monospace;
  }

  .hist-sobrou {
    font-size: 12px;
    color: var(--muted);
    font-family: 'DM Mono', monospace;
  }

  .hist-sobrou strong.ok { color: var(--green); }
  .hist-sobrou strong.bad { color: var(--red); }

  /* ICONS (inline SVG fallback, simple chars) */
  .icon { display: inline-block; line-height: 1; }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(6px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  /* Scrollbar */
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: var(--bg); }
  ::-webkit-scrollbar-thumb { background: var(--surface2); border-radius: 3px; }
</style>
</head>
<body>
<div class="app">

  <!-- HEADER -->
  <div class="header">
    <div class="header-top">
      <div class="logo">
        Cofre
        <span>organizador financeiro pessoal</span>
      </div>
      <div class="mes-badge" id="mesBadge"></div>
    </div>
  </div>

  <!-- SALÁRIO -->
  <div class="salary-block">
    <div class="block-label">salário do mês</div>
    <div class="salary-row">
      <span class="currency-prefix">R$</span>
      <input type="number" id="salarioInput" value="1750.68" step="0.01" min="0" oninput="recalc()">
      <span class="disponivel-label">disponível: <strong id="dispVal">R$ 1.750,68</strong></span>
    </div>
  </div>

  <!-- INVESTIMENTO -->
  <div class="invest-block">
    <div class="block-label">rendimento do investimento</div>
    <div class="invest-grid">
      <div class="invest-field">
        <label>Total acumulado (R$)</label>
        <input type="number" id="investAcum" value="240" step="0.01" min="0" oninput="calcRend()">
      </div>
      <div class="invest-field">
        <label>Taxa mensal (%)</label>
        <input type="number" id="investTaxa" value="1.0" step="0.01" min="0" max="100" oninput="calcRend()">
      </div>
    </div>
    <div class="invest-result" id="investResult">—</div>
  </div>

  <!-- SUMMARY -->
  <div class="summary">
    <div class="sum-card">
      <div class="lbl">salário</div>
      <div class="val neutral" id="sumSal">R$ 0,00</div>
    </div>
    <div class="sum-card">
      <div class="lbl">distribuído</div>
      <div class="val neutral" id="sumDist">R$ 0,00</div>
    </div>
    <div class="sum-card">
      <div class="lbl">sobrou</div>
      <div class="val ok" id="sumSob">R$ 0,00</div>
    </div>
  </div>

  <!-- BOTÕES -->
  <div class="btn-row">
    <button class="btn btn-gold" onclick="autoDistribuir()">
      ✦ Distribuir automaticamente
    </button>
    <button class="btn btn-green" onclick="toggleAddForm()">
      + Nova categoria
    </button>
    <button class="btn btn-outline" onclick="salvarHistorico()">
      ↓ Salvar organização
    </button>
  </div>

  <!-- FORM NOVA CATEGORIA -->
  <div class="add-form" id="addForm">
    <div class="block-label">nova categoria</div>
    <div class="add-form-grid">
      <div class="field">
        <label>Nome</label>
        <input type="text" id="newName" placeholder="ex: Academia">
      </div>
      <div class="field">
        <label>% do salário</label>
        <input type="number" id="newPct" placeholder="10" min="0" max="100" step="0.1">
      </div>
      <div class="field">
        <label>Emoji</label>
        <input type="text" id="newEmoji" placeholder="🎯" maxlength="2" style="text-align:center;font-size:1.2rem">
      </div>
    </div>
    <div style="margin-top:10px">
      <button class="btn btn-gold" onclick="addCategoria()">Adicionar</button>
      <button class="btn btn-outline" onclick="toggleAddForm()" style="margin-left:6px">Cancelar</button>
    </div>
  </div>

  <!-- CATEGORIAS -->
  <div class="cats-title">categorias</div>
  <div class="cats-grid" id="catsGrid"></div>

  <!-- HISTÓRICO -->
  <div class="hist-section">
    <div class="hist-header">
      <div class="hist-title">histórico salvo</div>
      <button class="btn btn-outline" onclick="limparHistorico()" style="font-size:12px;padding:6px 12px">Limpar tudo</button>
    </div>
    <div id="histList"></div>
  </div>

</div>

<script>
  let cats = [
    {id:1, name:'Lazer com namorada', pct:16.57, emoji:'💑', manual:null},
    {id:2, name:'Investimentos',       pct:13.71, emoji:'📈', manual:null},
    {id:3, name:'Emergência',          pct:11.08, emoji:'🛡️', manual:null},
    {id:4, name:'Roupas',              pct:5.71,  emoji:'👕', manual:null},
    {id:5, name:'Carro (poupança)',    pct:10.0,  emoji:'🚗', manual:null},
  ];
  let nextId = 10;

  function fmt(v) {
    return 'R$ ' + v.toFixed(2).replace('.', ',').replace(/\B(?=(\d{3})+(?!\d))/g, '.');
  }

  function sal() {
    return parseFloat(document.getElementById('salarioInput').value) || 0;
  }

  function recalc() {
    const s = sal();
    document.getElementById('dispVal').textContent = fmt(s);
    renderCats();
    calcRend();
  }

  function calcRend() {
    const acum = parseFloat(document.getElementById('investAcum').value) || 0;
    const taxa = parseFloat(document.getElementById('investTaxa').value) || 0;
    const rend = acum * taxa / 100;
    const s = sal();
    const catI = cats.find(c => c.name.toLowerCase().includes('invest'));
    let aporte = catI ? (catI.manual != null ? catI.manual : s * catI.pct / 100) : 0;
    const novoAcum = acum + aporte;
    const novoRend = novoAcum * taxa / 100;
    document.getElementById('investResult').innerHTML =
      `Rendimento atual: <strong>${fmt(rend)}/mês</strong> &nbsp;|&nbsp; ` +
      `Após aporte de ${fmt(aporte)}: total acumulado ≈ <strong>${fmt(novoAcum)}</strong>, rendendo ≈ <strong>${fmt(novoRend)}/mês</strong>`;
  }

  function totalDist() {
    const s = sal();
    return cats.reduce((acc, c) => acc + (c.manual != null ? c.manual : s * c.pct / 100), 0);
  }

  function renderCats() {
    const s = sal();
    const grid = document.getElementById('catsGrid');
    grid.innerHTML = cats.map((c, i) => {
      const v = c.manual != null ? c.manual : s * c.pct / 100;
      const pctReal = s > 0 ? (v / s * 100).toFixed(1) : c.pct.toFixed(1);
      const fill = Math.min(100, parseFloat(pctReal));
      return `<div class="cat-card">
        <div class="cat-header">
          <div class="cat-emoji">${c.emoji}</div>
          <span class="cat-name">${c.name}</span>
          <button class="cat-del" onclick="delCat(${c.id})" title="Excluir">✕</button>
        </div>
        <div class="cat-inputs">
          <input type="number" value="${c.pct.toFixed(1)}" min="0" max="100" step="0.1"
            style="width:70px" title="Porcentagem"
            oninput="updatePct(${c.id},this.value)">
          <span class="pct-sign">%</span>
          <span class="or-divider">ou</span>
          <input type="number" placeholder="R$ fixo" step="0.01" min="0"
            value="${c.manual != null ? c.manual : ''}"
            style="flex:1" title="Valor manual"
            oninput="updateManual(${c.id},this.value)">
        </div>
        <div class="cat-value">${fmt(v)}</div>
        <div class="cat-sub">${pctReal}% do salário</div>
        <div class="prog-bar"><div class="prog-fill" style="width:${fill}%"></div></div>
      </div>`;
    }).join('');

    const dist = totalDist();
    const sob = s - dist;
    document.getElementById('sumSal').textContent = fmt(s);
    document.getElementById('sumDist').textContent = fmt(dist);
    const el = document.getElementById('sumSob');
    el.textContent = fmt(sob);
    el.className = 'val ' + (sob < 0 ? 'bad' : sob < 50 ? 'warn' : 'ok');
  }

  function updatePct(id, val) {
    const c = cats.find(x => x.id === id);
    if (!c) return;
    c.pct = parseFloat(val) || 0;
    c.manual = null;
    renderCats(); calcRend();
  }

  function updateManual(id, val) {
    const c = cats.find(x => x.id === id);
    if (!c) return;
    const s = sal();
    if (val === '' || val === null) { c.manual = null; }
    else {
      c.manual = parseFloat(val) || 0;
      if (s > 0) c.pct = +(c.manual / s * 100).toFixed(2);
    }
    renderCats(); calcRend();
  }

  function delCat(id) {
    cats = cats.filter(x => x.id !== id);
    renderCats(); calcRend();
  }

  function toggleAddForm() {
    const f = document.getElementById('addForm');
    f.classList.toggle('open');
  }

  function addCategoria() {
    const name = document.getElementById('newName').value.trim();
    const pct  = parseFloat(document.getElementById('newPct').value) || 0;
    const emoji = document.getElementById('newEmoji').value.trim() || '📁';
    if (!name) { alert('Coloca um nome na categoria!'); return; }
    cats.push({ id: nextId++, name, pct, emoji, manual: null });
    document.getElementById('newName').value = '';
    document.getElementById('newPct').value = '';
    document.getElementById('newEmoji').value = '';
    document.getElementById('addForm').classList.remove('open');
    renderCats(); calcRend();
  }

  function autoDistribuir() {
    const total = cats.reduce((s, c) => s + c.pct, 0);
    if (total <= 0) return;
    if (total > 100) {
      const f = 100 / total;
      cats.forEach(c => { c.pct = +(c.pct * f).toFixed(2); c.manual = null; });
    } else {
      cats.forEach(c => c.manual = null);
    }
    renderCats(); calcRend();
  }

  function salvarHistorico() {
    const s = sal();
    const dist = totalDist();
    const sob = s - dist;
    const now = new Date();
    const dateStr = now.toLocaleDateString('pt-BR', {day:'2-digit',month:'2-digit',year:'numeric'})
      + ' ' + now.toLocaleTimeString('pt-BR', {hour:'2-digit',minute:'2-digit'});
    const entry = {
      id: Date.now(),
      date: dateStr,
      salario: s,
      dist,
      sob,
      cats: cats.map(c => ({
        name: c.name,
        emoji: c.emoji,
        value: c.manual != null ? c.manual : s * c.pct / 100
      }))
    };
    const hist = getHist();
    hist.unshift(entry);
    if (hist.length > 30) hist.length = 30;
    localStorage.setItem('cofre_hist', JSON.stringify(hist));
    renderHist();
  }

  function getHist() {
    try { return JSON.parse(localStorage.getItem('cofre_hist')) || []; }
    catch { return []; }
  }

  function delHist(id) {
    const hist = getHist().filter(x => x.id !== id);
    localStorage.setItem('cofre_hist', JSON.stringify(hist));
    renderHist();
  }

  function limparHistorico() {
    if (!confirm('Apagar todo o histórico?')) return;
    localStorage.removeItem('cofre_hist');
    renderHist();
  }

  function renderHist() {
    const hist = getHist();
    const el = document.getElementById('histList');
    if (!hist.length) {
      el.innerHTML = '<div class="hist-empty">Nenhuma organização salva ainda. Clique em "Salvar organização" quando quiser registrar.</div>';
      return;
    }
    el.innerHTML = hist.map(h => `
      <div class="hist-entry">
        <div class="hist-top">
          <span class="hist-date">🕐 ${h.date}</span>
          <span class="hist-sal">${fmt(h.salario)}</span>
          <button class="hist-del" onclick="delHist(${h.id})" title="Excluir">✕</button>
        </div>
        <div class="hist-badges">
          ${h.cats.map(c => `<span class="hist-badge">${c.emoji} ${c.name}: ${fmt(c.value)}</span>`).join('')}
        </div>
        <div class="hist-sobrou">sobrou: <strong class="${h.sob < 0 ? 'bad' : 'ok'}">${fmt(h.sob)}</strong></div>
      </div>
    `).join('');
  }

  // Set date badge
  const now = new Date();
  document.getElementById('mesBadge').textContent =
    now.toLocaleDateString('pt-BR', {month:'long', year:'numeric'});

  recalc();
  renderHist();
</script>
</body>
</html>
